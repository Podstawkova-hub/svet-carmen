<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Svět Carmen</title>

  <meta
    name="description"
    content="Vítej ve Světě Carmen. Tady každý příběh začíná srdcem."
  >

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background: #15080f;
      overflow-x: hidden;
    }

    /*
      Celý obrázek funguje jako jedna hlavní plocha.
      Jeho výška se dopočítá automaticky,
      takže se obrázek vůbec neořízne.
    */
    .hero {
      position: relative;
      width: 100%;
      max-width: 2048px;
      margin: 0 auto;
    }

    .hero-image {
      display: block;
      width: 100%;
      height: auto;

      user-select: none;
      -webkit-user-drag: none;
    }

    /*
      Tlačítko je položené přes spodní část obrázku.
    */
    .enter-button {
      position: absolute;

      left: 50%;
      bottom: 3.2%;

      transform: translateX(-50%);

      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;

      min-width: 285px;
      padding: 16px 30px;

      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 999px;

      background: linear-gradient(
        135deg,
        #d52d78,
        #ed5795
      );

      color: #ffffff;

      font-family: Arial, Helvetica, sans-serif;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;

      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.35),
        0 0 25px rgba(234, 63, 137, 0.35);

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .enter-button:hover {
      transform: translateX(-50%) scale(1.04);

      box-shadow:
        0 14px 38px rgba(0, 0, 0, 0.42),
        0 0 32px rgba(234, 63, 137, 0.5);
    }

    .enter-button:focus-visible {
      outline: 3px solid #ffffff;
      outline-offset: 4px;
    }

    .arrow {
      font-size: 23px;
      line-height: 1;
    }

    /*
      Mobilní zobrazení.
    */
    @media (max-width: 700px) {
      .enter-button {
        bottom: 2%;

        min-width: 0;
        width: calc(100% - 36px);
        max-width: 340px;

        padding: 14px 20px;
        font-size: 15px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .enter-button {
        transition: none;
      }
    }
  </style>
</head>

<body>

  <main class="hero">

    <img
      class="hero-image"
      src="uvod-svet-carmen.png"
      alt="Svět Carmen s Carmen, fénixem, Miou a Čestmírkem"
    >

    <a
      class="enter-button"
      href="o-carmen.html"
    >
      <span>Vstoupit a poznat Carmen</span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>

  </main>

</body>
</html>
