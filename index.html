<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Svět Carmen</title>

  <meta
    name="description"
    content="Vítej ve Světě Carmen. Tady každý příběh začíná srdcem."
  >

  <style>
    :root{
      --deep:#a52d6f;
      --pink:#e45b91;
      --text:#2c1d24;
      --cream:#fff8f4;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      min-height:100%;
    }

    body{
      min-height:100vh;
      overflow:hidden;
      color:var(--text);
      font-family:Georgia,"Times New Roman",serif;
      background:
        radial-gradient(circle at 14% 28%,rgba(255,255,255,.95),transparent 33%),
        linear-gradient(135deg,#fff8f4 0%,#ffeaf3 52%,#f6bfd2 100%);
    }

    .home{
      position:relative;
      min-height:100vh;
      overflow:hidden;
      isolation:isolate;
    }

    /* Celý obrázek je vidět – není oříznutý jako při background-size:cover */
    .hero-picture{
      position:absolute;
      inset:0 0 0 auto;
      z-index:-2;
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:right center;
    }

    /* Jemné propojení světlé textové části s obrázkem */
    .home::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:-1;
      pointer-events:none;
      background:
        linear-gradient(
          90deg,
          rgba(255,249,246,1) 0%,
          rgba(255,249,246,.99) 22%,
          rgba(255,249,246,.94) 32%,
          rgba(255,249,246,.70) 42%,
          rgba(255,249,246,.22) 52%,
          transparent 64%
        );
    }

    .brand{
      position:absolute;
      top:30px;
      left:4vw;
      z-index:3;
      color:var(--text);
      line-height:.9;
      font-size:22px;
    }

    .brand strong{
      display:block;
      color:var(--deep);
      font-size:35px;
      font-style:italic;
      font-weight:normal;
    }

    .music-btn{
      position:absolute;
      top:28px;
      right:3.5vw;
      z-index:4;
      display:flex;
      align-items:center;
      gap:12px;
      padding:11px 17px;
      border:1px solid rgba(255,255,255,.28);
      border-radius:999px;
      color:white;
      background:rgba(38,18,28,.76);
      backdrop-filter:blur(10px);
      font-family:Arial,Helvetica,sans-serif;
      font-size:14px;
      cursor:pointer;
      box-shadow:0 10px 28px rgba(49,20,34,.23);
      transition:transform .2s ease,background .2s ease;
    }

    .music-btn:hover{
      transform:translateY(-1px);
      background:rgba(38,18,28,.88);
    }

    .music-icon{
      display:grid;
      place-items:center;
      width:31px;
      height:31px;
      border-radius:50%;
      color:var(--deep);
      background:white;
      font-size:14px;
    }

    .home-content{
      position:relative;
      z-index:2;
      width:min(660px,43vw);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      margin-left:4vw;
      padding:110px 20px 70px 0;
    }

    .welcome{
      margin-bottom:2px;
      font-size:clamp(43px,4vw,68px);
      font-weight:normal;
      line-height:1.05;
    }

    h1{
      margin-bottom:24px;
      color:var(--deep);
      font-size:clamp(58px,6vw,96px);
      font-weight:normal;
      line-height:.95;
      letter-spacing:-2px;
    }

    .motto{
      max-width:620px;
      margin-bottom:19px;
      font-size:clamp(25px,2.3vw,37px);
      font-style:italic;
      line-height:1.25;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:12px;
      width:min(490px,100%);
      margin:5px 0 24px;
      color:var(--pink);
    }

    .divider::before,
    .divider::after{
      content:"";
      height:1px;
      flex:1;
      background:rgba(228,91,145,.43);
    }

    .intro-text{
      max-width:600px;
      margin-bottom:29px;
      font-size:clamp(18px,1.45vw,24px);
      line-height:1.55;
    }

    .enter-btn{
      align-self:flex-start;
      display:inline-flex;
      align-items:center;
      gap:18px;
      padding:17px 29px;
      color:white;
      background:linear-gradient(135deg,var(--deep),var(--pink));
      border-radius:999px;
      text-decoration:none;
      font-family:Arial,Helvetica,sans-serif;
      font-size:17px;
      font-weight:bold;
      box-shadow:0 15px 34px rgba(165,45,111,.27);
      transition:transform .22s ease,box-shadow .22s ease;
    }

    .enter-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 20px 43px rgba(165,45,111,.34);
    }

    .enter-btn:focus-visible,
    .music-btn:focus-visible{
      outline:3px solid rgba(255,116,184,.55);
      outline-offset:4px;
    }

    audio{
      display:none;
    }

    @media(max-width:1000px){
      body{
        overflow:auto;
      }

      .home{
        min-height:100svh;
        padding-top:54vh;
      }

      .hero-picture{
        width:100%;
        height:58vh;
        object-position:center top;
      }

      .home::before{
        background:
          linear-gradient(
            180deg,
            transparent 0%,
            transparent 36%,
            rgba(255,249,246,.66) 50%,
            rgba(255,249,246,.97) 66%,
            rgba(255,249,246,1) 100%
          );
      }

      .brand{
        top:18px;
        left:22px;
      }

      .brand{
        color:white;
        text-shadow:0 2px 12px rgba(0,0,0,.35);
      }

      .brand strong{
        color:#ffd4e4;
      }

      .music-btn{
        top:17px;
        right:18px;
      }

      .home-content{
        width:100%;
        min-height:auto;
        margin-left:0;
        padding:40px 7vw 55px;
        text-align:center;
        align-items:center;
      }

      .divider{
        margin-left:auto;
        margin-right:auto;
      }

      .enter-btn{
        align-self:center;
      }
    }

    @media(max-width:560px){
      .home{
        padding-top:48vh;
      }

      .hero-picture{
        height:52vh;
      }

      .brand{
        font-size:16px;
      }

      .brand strong{
        font-size:25px;
      }

      .music-btn{
        padding:8px 11px;
        font-size:0;
      }

      .music-icon{
        width:32px;
        height:32px;
        font-size:15px;
      }

      .home-content{
        padding:34px 23px 45px;
      }

      .welcome{
        font-size:40px;
      }

      h1{
        font-size:54px;
      }

      .motto{
        font-size:25px;
      }

      .intro-text{
        font-size:18px;
      }

      .enter-btn{
        width:100%;
        max-width:350px;
        justify-content:center;
      }
    }
  </style>
</head>

<body>

  <main class="home">

    <!--
      DŮLEŽITÉ:
      Nahraj nový úvodní obrázek na GitHub pod názvem:
      uvod-svet-carmen.png
    -->
    <img
      class="hero-picture"
      src="uvod-svet-carmen.png"
      alt="Svět Carmen – Carmen, fénix, Mia, Čestmírek a příběhy plné naděje"
    >

    <div class="brand" aria-label="Svět Carmen">
      Svět
      <strong>Carmen♡</strong>
    </div>

    <button
      class="music-btn"
      id="musicButton"
      type="button"
      aria-label="Pustit hymnu Světa Carmen"
      aria-pressed="false"
    >
      <span id="musicText">Pustit hymnu Světa Carmen</span>
      <span class="music-icon" id="musicIcon">▶</span>
    </button>

    <section class="home-content">

      <p class="welcome">Vítej ve</p>

      <h1>Světě Carmen.</h1>

      <p class="motto">
        Tady každý příběh začíná srdcem.
      </p>

      <div class="divider" aria-hidden="true">♡</div>

      <p class="intro-text">
        Příběhy o odvaze, přátelství, zvířatech,
        naději a druhých začátcích.
      </p>

      <a class="enter-btn" href="carmen.html">
        Vstoupit a poznat Carmen
        <span aria-hidden="true">→</span>
      </a>

    </section>

  </main>

  <audio id="bgmusic" loop preload="metadata">
    <source src="Svět Carmen.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById("bgmusic");
    const musicButton = document.getElementById("musicButton");
    const musicText = document.getElementById("musicText");
    const musicIcon = document.getElementById("musicIcon");

    music.volume = 0.35;

    musicButton.addEventListener("click", async function () {
      if (music.paused) {
        try {
          await music.play();
          musicText.textContent = "Pozastavit hymnu";
          musicIcon.textContent = "❚❚";
          musicButton.setAttribute("aria-pressed", "true");
          musicButton.setAttribute(
            "aria-label",
            "Pozastavit hymnu Světa Carmen"
          );
        } catch (error) {
          musicText.textContent = "Hudbu se nepodařilo spustit";
          musicIcon.textContent = "♪";
        }
      } else {
        music.pause();
        musicText.textContent = "Pustit hymnu Světa Carmen";
        musicIcon.textContent = "▶";
        musicButton.setAttribute("aria-pressed", "false");
        musicButton.setAttribute(
          "aria-label",
          "Pustit hymnu Světa Carmen"
        );
      }
    });
  </script>

</body>
</html>
