<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Svět Carmen</title>

  <meta
    name="description"
    content="Vítej ve Světě Carmen. Tady každý příběh začíná srdcem."
  >

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #17090f;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100svh;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: hidden;
      background: #17090f;
    }

    .hero-image {
      display: block;

      width: 100%;
      height: 100%;

      object-fit: contain;
      object-position: center;

      user-select: none;
      -webkit-user-drag: none;
    }

    .click-area {
      position: absolute;
      display: block;
      border: 0;
      background: transparent;
      cursor: pointer;
      z-index: 5;
    }

    .enter-link {
      left: 3.2%;
      top: 60.2%;
      width: 21.6%;
      height: 6.5%;
      border-radius: 999px;
    }

    .music-button {
      left: 78.2%;
      top: 3.2%;
      width: 18.8%;
      height: 5.2%;
      border-radius: 999px;
    }

    .bottom-link {
      left: 47.2%;
      bottom: 0.8%;
      width: 5.5%;
      height: 7%;
      border-radius: 50%;
    }

    .click-area:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .click-area:focus-visible {
      outline: 3px solid #ffffff;
      outline-offset: 3px;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-aspect-ratio: 3 / 2) {
      .hero {
        align-items: center;
      }
    }
  </style>
</head>

<body>

  <main class="hero">

    <img
      class="hero-image"
      src="uvod-final.png"
      alt="Vítej ve Světě Carmen"
    >

    <a
      class="click-area enter-link"
      href="svet.html"
      aria-label="Vstoupit a poznat Carmen"
    >
      <span class="visually-hidden">
        Vstoupit a poznat Carmen
      </span>
    </a>

    <button
      class="click-area music-button"
      id="musicButton"
      type="button"
      aria-label="Pustit hymnu Světa Carmen"
      aria-pressed="false"
    >
      <span class="visually-hidden">
        Pustit nebo zastavit hymnu Světa Carmen
      </span>
    </button>

    <a
      class="click-area bottom-link"
      href="svet.html"
      aria-label="Pokračovat dál"
    >
      <span class="visually-hidden">
        Pokračovat dál
      </span>
    </a>

    <audio
      id="carmenMusic"
      preload="metadata"
      loop
    >
      <source
        src="ladybug-little-bug.mp3.mp3"
        type="audio/mpeg"
      >
    </audio>

  </main>

  <script>
    const musicButton = document.getElementById("musicButton");
    const carmenMusic = document.getElementById("carmenMusic");

    musicButton.addEventListener("click", async () => {
      try {
        if (carmenMusic.paused) {
          await carmenMusic.play();
          musicButton.setAttribute("aria-pressed", "true");
          musicButton.setAttribute(
            "aria-label",
            "Zastavit hymnu Světa Carmen"
          );
        } else {
          carmenMusic.pause();
          musicButton.setAttribute("aria-pressed", "false");
          musicButton.setAttribute(
            "aria-label",
            "Pustit hymnu Světa Carmen"
          );
        }
      } catch (error) {
        console.error("Hymnu se nepodařilo přehrát:", error);
      }
    });
  </script>

</body>
</html>
