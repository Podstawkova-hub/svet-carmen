<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Svět Carmen</title>

  <meta
    name="description"
    content="Vítej ve Světě Carmen. Tady každý příběh začíná srdcem."
  >

  <style>
    :root{
      --pink:#d83f83;
      --pink-dark:#a92768;
      --text:#311f28;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      min-height:100%;
    }

    body{
      overflow:hidden;
      font-family:Georgia, "Times New Roman", serif;
      background:#f7c9d8;
      color:var(--text);
    }

    button,
    a{
      -webkit-tap-highlight-color:transparent;
    }

    .hero{
      position:relative;
      width:100%;
      height:100vh;
      min-height:650px;
      overflow:hidden;
      isolation:isolate;
    }

    /*
      Rozmazaná kopie obrazu vyplní celou obrazovku.
      Nevzniknou bílé nebo prázdné plochy.
    */
    .hero-background{
      position:absolute;
      inset:-35px;
      z-index:-4;

      background-image:url("uvod-svet-carmen.png.png");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;

      filter:blur(35px) brightness(.92) saturate(.92);
      transform:scale(1.09);
    }

    /*
      Jemné zklidnění levé strany pod textem.
      Není to karta ani rámeček.
    */
    .hero-shade{
      position:absolute;
      inset:0;
      z-index:-2;
      pointer-events:none;

      background:
        linear-gradient(
          90deg,
          rgba(255,249,248,.98) 0%,
          rgba(255,246,247,.92) 17%,
          rgba(255,239,244,.67) 30%,
          rgba(255,224,235,.28) 43%,
          transparent 57%
        ),
        linear-gradient(
          180deg,
          rgba(255,255,255,.12) 0%,
          transparent 25%,
          transparent 78%,
          rgba(76,17,45,.12) 100%
        );
    }

    /*
      Ostrý originální obraz.
      contain = vždy celý, nikdy se neořízne.
    */
    .main-image{
      position:absolute;
      z-index:-3;

      top:0;
      right:0;

      width:76%;
      height:100%;

      object-fit:contain;
      object-position:right center;

      filter:
        drop-shadow(-18px 0 34px rgba(75,20,45,.18))
        drop-shadow(0 22px 34px rgba(45,9,27,.25));
    }

    /*
      Jemné rozpuštění pouze na levém okraji ostrého obrazu.
    */
    .image-blend{
      position:absolute;
      z-index:-1;

      top:0;
      bottom:0;
      left:24%;
      width:25%;

      pointer-events:none;

      background:linear-gradient(
        90deg,
        rgba(255,247,247,.94) 0%,
        rgba(255,241,245,.68) 30%,
        rgba(255,224,235,.26) 67%,
        transparent 100%
      );
    }

    .brand{
      position:absolute;
      top:25px;
      left:3vw;
      z-index:10;

      color:var(--text);
      font-size:18px;
      line-height:.92;
    }

    .brand strong{
      display:block;
      color:var(--pink-dark);
      font-size:31px;
      font-style:italic;
      font-weight:normal;
    }

    .music-btn{
      position:absolute;
      top:22px;
      right:3vw;
      z-index:10;

      display:flex;
      align-items:center;
      gap:10px;

      padding:9px 10px 9px 17px;
      border:1px solid rgba(255,255,255,.3);
      border-radius:999px;

      color:#fff;
      background:rgba(48,28,38,.82);
      backdrop-filter:blur(10px);

      font-family:Arial, Helvetica, sans-serif;
      font-size:13px;
      font-weight:600;
      cursor:pointer;

      box-shadow:0 10px 28px rgba(38,14,26,.25);
      transition:.2s ease;
    }

    .music-btn:hover{
      transform:translateY(-2px);
      background:rgba(48,28,38,.94);
    }

    .music-icon{
      display:grid;
      place-items:center;

      width:32px;
      height:32px;
      border-radius:50%;

      color:var(--pink-dark);
      background:#fff;
      font-size:13px;
    }

    /*
      Malý text, který obraz nepřebíjí.
    */
    .hero-content{
      position:absolute;
      z-index:5;

      top:50%;
      left:clamp(26px,3vw,64px);
      transform:translateY(-46%);

      width:min(430px,32vw);
    }

    .welcome{
      margin-bottom:2px;
      font-size:clamp(30px,2.7vw,47px);
      line-height:1;
      font-weight:normal;
    }

    h1{
      margin-bottom:16px;

      color:var(--pink-dark);
      font-size:clamp(45px,4vw,69px);
      line-height:.94;
      letter-spacing:-1.5px;
      font-weight:normal;
    }

    .motto{
      max-width:420px;
      margin-bottom:14px;

      font-size:clamp(20px,1.65vw,28px);
      line-height:1.3;
      font-style:italic;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:11px;

      width:min(340px,100%);
      margin-bottom:17px;

      color:#e25c95;
    }

    .divider::before,
    .divider::after{
      content:"";
      height:1px;
      flex:1;
      background:rgba(215,67,132,.42);
    }

    .intro{
      max-width:410px;
      margin-bottom:22px;

      font-size:clamp(15px,1.05vw,18px);
      line-height:1.55;
    }

    .enter-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:17px;

      padding:14px 24px;
      border-radius:999px;

      color:#fff;
      background:linear-gradient(
        135deg,
        var(--pink-dark),
        #e65d97
      );

      text-decoration:none;
      font-family:Arial, Helvetica, sans-serif;
      font-size:14px;
      font-weight:700;

      box-shadow:
        0 13px 28px rgba(169,39,104,.31),
        0 0 22px rgba(230,93,151,.14);

      transition:.2s ease;
    }

    .enter-btn:hover{
      transform:translateY(-2px);
      box-shadow:
        0 18px 36px rgba(169,39,104,.38),
        0 0 27px rgba(230,93,151,.18);
    }

    audio{
      display:none;
    }

    /*
      Menší notebooky.
    */
    @media(max-width:1200px){
      .main-image{
        width:72%;
      }

      .hero-content{
        width:35vw;
      }

      h1{
        font-size:58px;
      }
    }

    /*
      Mobil a tablet:
      obraz zůstává celý nahoře, text je pod ním.
    */
    @media(max-width:850px){
      body{
        overflow:auto;
      }

      .hero{
        min-height:100svh;
        height:auto;
        overflow:visible;
        padding-top:72px;
      }

      .hero-background{
        position:fixed;
      }

      .hero-shade{
        position:fixed;
        background:rgba(255,246,248,.58);
        backdrop-filter:blur(4px);
      }

      .main-image{
        position:relative;
        top:auto;
        right:auto;

        display:block;

        width:100%;
        height:auto;
        max-height:70svh;

        object-fit:contain;
        object-position:center;

        margin:0 auto;

        filter:drop-shadow(0 18px 30px rgba(55,14,34,.26));
      }

      .image-blend{
        display:none;
      }

      .hero-content{
        position:relative;
        top:auto;
        left:auto;
        transform:none;

        width:100%;
        max-width:650px;

        margin:0 auto;
        padding:30px 25px 55px;

        text-align:center;
      }

      .divider{
        margin-left:auto;
        margin-right:auto;
      }

      .brand{
        top:16px;
        left:20px;
      }

      .music-btn{
        top:15px;
        right:17px;
      }
    }

    @media(max-width:520px){
      .brand{
        font-size:15px;
      }

      .brand strong{
        font-size:24px;
      }

      .music-btn{
        padding:7px;
        font-size:0;
      }

      .music-icon{
        width:34px;
        height:34px;
      }

      .main-image{
        max-height:none;
      }

      .hero-content{
        padding-top:25px;
      }

      .welcome{
        font-size:34px;
      }

      h1{
        font-size:49px;
      }

      .motto{
        font-size:22px;
      }

      .intro{
        font-size:17px;
      }

      .enter-btn{
        width:100%;
        max-width:340px;
      }
    }

    /*
      Nízké monitory.
    */
    @media(min-width:851px) and (max-height:720px){
      .hero-content{
        transform:translateY(-42%);
      }

      .welcome{
        font-size:34px;
      }

      h1{
        margin-bottom:12px;
        font-size:52px;
      }

      .motto{
        margin-bottom:10px;
        font-size:22px;
      }

      .divider{
        margin-bottom:12px;
      }

      .intro{
        margin-bottom:17px;
        font-size:15px;
      }

      .enter-btn{
        padding:12px 21px;
      }
    }
  </style>
</head>

<body>

  <main class="hero">

    <div
      class="hero-background"
      aria-hidden="true"
    ></div>

    <img
      class="main-image"
      src="uvod-svet-carmen.png.png"
      alt="Carmen s fénixem, Miou, Čestmírkem a světem příběhů"
    >

    <div
      class="hero-shade"
      aria-hidden="true"
    ></div>

    <div
      class="image-blend"
      aria-hidden="true"
    ></div>

    <div class="brand" aria-label="Svět Carmen">
      Svět
      <strong>Carmen♡</strong>
    </div>

    <button
      class="music-btn"
      id="musicButton"
      type="button"
      aria-label="Pustit hymnu Světa Carmen"
      aria-pressed="false"
    >
      <span id="musicText">
        Pustit hymnu Světa Carmen
      </span>

      <span
        class="music-icon"
        id="musicIcon"
        aria-hidden="true"
      >
        ▶
      </span>
    </button>

    <section class="hero-content">

      <p class="welcome">
        Vítej ve
      </p>

      <h1>
        Světě Carmen.
      </h1>

      <p class="motto">
        Tady každý příběh začíná srdcem.
      </p>

      <div
        class="divider"
        aria-hidden="true"
      >
        ♡
      </div>

      <p class="intro">
        Příběhy o odvaze, přátelství, zvířatech,
        naději a druhých začátcích.
      </p>

      <a
        class="enter-btn"
        href="carmen.html"
      >
        Vstoupit a poznat Carmen
        <span aria-hidden="true">→</span>
      </a>

    </section>

  </main>

  <audio
    id="bgmusic"
    loop
    preload="metadata"
  >
    <source
      src="Svět Carmen.mp3"
      type="audio/mpeg"
    >
  </audio>

  <script>
    const music = document.getElementById("bgmusic");
    const musicButton = document.getElementById("musicButton");
    const musicText = document.getElementById("musicText");
    const musicIcon = document.getElementById("musicIcon");

    music.volume = 0.35;

    musicButton.addEventListener("click", async function () {
      if (music.paused) {
        try {
          await music.play();

          musicText.textContent = "Pozastavit hymnu";
          musicIcon.textContent = "❚❚";

          musicButton.setAttribute(
            "aria-pressed",
            "true"
          );

          musicButton.setAttribute(
            "aria-label",
            "Pozastavit hymnu Světa Carmen"
          );
        } catch (error) {
          musicText.textContent =
            "Hudbu se nepodařilo spustit";

          musicIcon.textContent = "♪";
        }
      } else {
        music.pause();

        musicText.textContent =
          "Pustit hymnu Světa Carmen";

        musicIcon.textContent = "▶";

        musicButton.setAttribute(
          "aria-pressed",
          "false"
        );

        musicButton.setAttribute(
          "aria-label",
          "Pustit hymnu Světa Carmen"
        );
      }
    });
  </script>

</body>
</html>
