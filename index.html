<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Svět Carmen</title>

  <meta
    name="description"
    content="Vítej ve Světě Carmen. Tady každý příběh začíná srdcem."
  >

  <style>
    :root{
      --dark:#2d1d25;
      --pink:#d53b7d;
      --pink-dark:#ad2867;
      --background:#fff8f8;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      width:100%;
      min-height:100%;
    }

    body{
      width:100%;
      min-height:100vh;
      overflow-x:hidden;

      color:var(--dark);
      font-family:Georgia, "Times New Roman", serif;

      background:
        radial-gradient(
          circle at 80% 50%,
          rgba(255,154,190,.40) 0%,
          rgba(255,202,219,.25) 29%,
          rgba(255,235,241,.13) 48%,
          transparent 68%
        ),
        linear-gradient(
          90deg,
          #fffaf9 0%,
          #fff8f8 31%,
          #fff1f4 55%,
          #ffdfe9 100%
        );
    }

    a,
    button{
      -webkit-tap-highlight-color:transparent;
    }

    .home{
      position:relative;
      width:100%;
      min-height:100vh;
      overflow:hidden;
      isolation:isolate;
    }

    /*
      Jemné světlo za celou pravou částí.
    */
    .home::before{
      content:"";
      position:absolute;
      z-index:-3;

      top:-15%;
      right:-9%;
      width:78vw;
      height:135vh;

      pointer-events:none;

      background:
        radial-gradient(
          ellipse at center,
          rgba(255,103,162,.27) 0%,
          rgba(255,173,204,.20) 35%,
          rgba(255,224,234,.09) 58%,
          transparent 75%
        );

      filter:blur(28px);
    }

    /*
      Přechod mezi textem a obrázkem.
    */
    .home::after{
      content:"";
      position:absolute;
      z-index:3;

      top:0;
      bottom:0;
      left:27%;
      width:27%;

      pointer-events:none;

      background:linear-gradient(
        90deg,
        rgba(255,250,249,1) 0%,
        rgba(255,248,248,.97) 23%,
        rgba(255,243,246,.78) 52%,
        rgba(255,231,239,.38) 76%,
        transparent 100%
      );
    }

    .brand{
      position:absolute;
      z-index:20;

      top:25px;
      left:3vw;

      color:var(--dark);
      font-size:19px;
      line-height:.95;
    }

    .brand strong{
      display:block;

      color:var(--pink-dark);
      font-size:31px;
      font-style:italic;
      font-weight:normal;
    }

    .music-btn{
      position:absolute;
      z-index:20;

      top:22px;
      right:3vw;

      display:flex;
      align-items:center;
      gap:10px;

      padding:9px 10px 9px 17px;

      border:1px solid rgba(255,255,255,.30);
      border-radius:999px;

      color:#fff;
      background:rgba(52,31,41,.83);
      backdrop-filter:blur(10px);

      font-family:Arial, Helvetica, sans-serif;
      font-size:13px;
      font-weight:600;

      cursor:pointer;

      box-shadow:
        0 10px 25px rgba(52,23,38,.24),
        0 0 22px rgba(255,114,171,.13);

      transition:
        transform .2s ease,
        background .2s ease;
    }

    .music-btn:hover{
      transform:translateY(-2px);
      background:rgba(52,31,41,.94);
    }

    .music-icon{
      display:grid;
      place-items:center;

      width:32px;
      height:32px;

      border-radius:50%;

      color:var(--pink-dark);
      background:#fff;

      font-size:13px;
    }

    .hero{
      position:relative;
      width:100%;
      min-height:100vh;
    }

    /*
      Textová část vlevo.
    */
    .hero-content{
      position:relative;
      z-index:10;

      width:39%;
      min-height:100vh;

      display:flex;
      flex-direction:column;
      justify-content:center;

      padding:
        115px
        20px
        65px
        clamp(42px,3vw,68px);
    }

    .welcome{
      font-size:clamp(43px,3.2vw,61px);
      line-height:1;
      font-weight:normal;
    }

    h1{
      margin-top:2px;
      margin-bottom:22px;

      color:var(--pink-dark);

      font-size:clamp(61px,5vw,88px);
      line-height:.94;
      letter-spacing:-2px;
      font-weight:normal;
    }

    .motto{
      max-width:590px;
      margin-bottom:17px;

      font-size:clamp(25px,2vw,35px);
      line-height:1.25;
      font-style:italic;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:12px;

      width:min(470px,100%);
      margin:0 0 22px;

      color:#e45d95;
    }

    .divider::before,
    .divider::after{
      content:"";
      height:1px;
      flex:1;

      background:rgba(222,80,143,.43);
    }

    .intro{
      max-width:560px;
      margin-bottom:27px;

      font-size:clamp(18px,1.25vw,22px);
      line-height:1.55;
    }

    .enter-btn{
      align-self:flex-start;

      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:18px;

      padding:16px 27px;

      border-radius:999px;

      color:#fff;
      background:linear-gradient(
        135deg,
        var(--pink-dark),
        #e95e97
      );

      text-decoration:none;

      font-family:Arial, Helvetica, sans-serif;
      font-size:16px;
      font-weight:700;

      box-shadow:
        0 14px 30px rgba(173,40,103,.28),
        0 0 22px rgba(233,94,151,.13);

      transition:
        transform .2s ease,
        box-shadow .2s ease;
    }

    .enter-btn:hover{
      transform:translateY(-2px);

      box-shadow:
        0 18px 38px rgba(173,40,103,.35),
        0 0 28px rgba(233,94,151,.18);
    }

    /*
      Celý obraz vpravo.
    */
    .hero-art{
      position:absolute;
      z-index:2;

      top:0;
      right:0;

      width:69%;
      height:100vh;
      min-height:690px;

      display:flex;
      align-items:center;
      justify-content:flex-end;

      padding:
        70px
        clamp(5px,1vw,18px)
        18px
        0;
    }

    /*
      Záře za obrazem.
    */
    .hero-art::before{
      content:"";
      position:absolute;
      z-index:-2;

      top:8%;
      right:-5%;
      bottom:2%;
      left:2%;

      pointer-events:none;

      background:
        radial-gradient(
          ellipse at 62% 48%,
          rgba(255,190,211,.58) 0%,
          rgba(255,139,180,.24) 40%,
          rgba(255,105,165,.10) 62%,
          transparent 78%
        );

      filter:blur(27px);
    }

    /*
      Obrázek je celý.
      Nepoužíváme cover, takže se nic neořízne.
      Maska rozpouští pouze jeho krajní okraje.
    */
    .hero-image{
      display:block;

      width:auto;
      height:auto;

      max-width:100%;
      max-height:calc(100vh - 88px);

      object-fit:contain;
      object-position:right center;

      filter:
        drop-shadow(0 23px 31px rgba(65,18,39,.22))
        drop-shadow(0 0 22px rgba(255,102,158,.14));

      -webkit-mask-image:
        linear-gradient(
          to right,
          transparent 0%,
          rgba(0,0,0,.17) 1.5%,
          rgba(0,0,0,.72) 4%,
          #000 8%,
          #000 100%
        ),
        linear-gradient(
          to bottom,
          transparent 0%,
          #000 2.5%,
          #000 96.5%,
          transparent 100%
        );

      -webkit-mask-composite:source-in;

      mask-image:
        linear-gradient(
          to right,
          transparent 0%,
          rgba(0,0,0,.17) 1.5%,
          rgba(0,0,0,.72) 4%,
          #000 8%,
          #000 100%
        ),
        linear-gradient(
          to bottom,
          transparent 0%,
          #000 2.5%,
          #000 96.5%,
          transparent 100%
        );

      mask-composite:intersect;
    }

    /*
      Další jemné světlo přes levý okraj obrazu.
      Tím se obraz propojí s textovou částí.
    */
    .image-blend{
      position:absolute;
      z-index:4;

      top:0;
      bottom:0;
      left:0;
      width:20%;

      pointer-events:none;

      background:linear-gradient(
        90deg,
        rgba(255,248,248,.97) 0%,
        rgba(255,244,247,.72) 35%,
        rgba(255,232,240,.28) 70%,
        transparent 100%
      );
    }

    audio{
      display:none;
    }

    @media(max-width:1250px){
      .hero-content{
        width:41%;
        padding-left:35px;
      }

      .hero-art{
        width:67%;
      }

      h1{
        font-size:69px;
      }

      .motto{
        font-size:27px;
      }
    }

    @media(max-width:1000px){
      .home{
        overflow:visible;
      }

      .home::after{
        display:none;
      }

      .hero{
        display:flex;
        flex-direction:column;
      }

      .hero-art{
        position:relative;
        order:1;

        top:auto;
        right:auto;

        width:100%;
        height:auto;
        min-height:0;

        justify-content:center;

        padding:
          80px
          14px
          0;
      }

      .hero-image{
        max-width:min(100%,690px);
        max-height:72svh;

        -webkit-mask-image:
          linear-gradient(
            to bottom,
            transparent 0%,
            #000 2%,
            #000 97%,
            transparent 100%
          );

        mask-image:
          linear-gradient(
            to bottom,
            transparent 0%,
            #000 2%,
            #000 97%,
            transparent 100%
          );
      }

      .image-blend{
        display:none;
      }

      .hero-content{
        order:2;

        width:100%;
        min-height:auto;
        max-width:760px;

        align-items:center;

        margin:0 auto;

        padding:
          36px
          7vw
          60px;

        text-align:center;
      }

      .divider{
        margin-left:auto;
        margin-right:auto;
      }

      .enter-btn{
        align-self:center;
      }

      .brand{
        top:17px;
        left:20px;
      }

      .music-btn{
        top:16px;
        right:18px;
      }
    }

    @media(max-width:560px){
      .brand{
        font-size:15px;
      }

      .brand strong{
        font-size:25px;
      }

      .music-btn{
        padding:7px;
        font-size:0;
      }

      .music-icon{
        width:34px;
        height:34px;
      }

      .hero-art{
        padding:
          72px
          5px
          0;
      }

      .hero-image{
        width:100%;
        max-height:none;
      }

      .hero-content{
        padding:
          28px
          22px
          45px;
      }

      .welcome{
        font-size:39px;
      }

      h1{
        font-size:53px;
        letter-spacing:-1px;
      }

      .motto{
        font-size:24px;
      }

      .intro{
        font-size:18px;
      }

      .enter-btn{
        width:100%;
        max-width:350px;
      }
    }

    @media(min-width:1001px) and (max-height:760px){
      .hero-content{
        padding-top:85px;
        padding-bottom:30px;
      }

      .welcome{
        font-size:39px;
      }

      h1{
        margin-bottom:16px;
        font-size:62px;
      }

      .motto{
        margin-bottom:12px;
        font-size:25px;
      }

      .divider{
        margin-bottom:15px;
      }

      .intro{
        margin-bottom:20px;
        font-size:18px;
      }

      .hero-art{
        padding-top:58px;
        padding-bottom:10px;
      }

      .hero-image{
        max-height:calc(100vh - 68px);
      }
    }
  </style>
</head>

<body>

  <main class="home">

    <div class="brand" aria-label="Svět Carmen">
      Svět
      <strong>Carmen♡</strong>
    </div>

    <button
      class="music-btn"
      id="musicButton"
      type="button"
      aria-label="Pustit hymnu Světa Carmen"
      aria-pressed="false"
    >
      <span id="musicText">
        Pustit hymnu Světa Carmen
      </span>

      <span
        class="music-icon"
        id="musicIcon"
        aria-hidden="true"
      >
        ▶
      </span>
    </button>

    <div class="hero">

      <section class="hero-content">

        <p class="welcome">
          Vítej ve
        </p>

        <h1>
          Světě Carmen.
        </h1>

        <p class="motto">
          Tady každý příběh začíná srdcem.
        </p>

        <div
          class="divider"
          aria-hidden="true"
        >
          ♡
        </div>

        <p class="intro">
          Příběhy o odvaze, přátelství, zvířatech,
          naději a druhých začátcích.
        </p>

        <a
          class="enter-btn"
          href="carmen.html"
        >
          Vstoupit a poznat Carmen
          <span aria-hidden="true">→</span>
        </a>

      </section>

      <section
        class="hero-art"
        aria-label="Hlavní obraz Světa Carmen"
      >

        <img
          class="hero-image"
          src="uvod-svet-carmen.png.png"
          alt="Carmen s fénixem, Miou, Čestmírkem a světem příběhů"
        >

        <div
          class="image-blend"
          aria-hidden="true"
        ></div>

      </section>

    </div>

  </main>

  <audio
    id="bgmusic"
    loop
    preload="metadata"
  >
    <source
      src="Svět Carmen.mp3"
      type="audio/mpeg"
    >
  </audio>

  <script>
    const music = document.getElementById("bgmusic");
    const musicButton = document.getElementById("musicButton");
    const musicText = document.getElementById("musicText");
    const musicIcon = document.getElementById("musicIcon");

    music.volume = 0.35;

    musicButton.addEventListener("click", async function () {
      if (music.paused) {
        try {
          await music.play();

          musicText.textContent = "Pozastavit hymnu";
          musicIcon.textContent = "❚❚";

          musicButton.setAttribute(
            "aria-pressed",
            "true"
          );

          musicButton.setAttribute(
            "aria-label",
            "Pozastavit hymnu Světa Carmen"
          );
        } catch (error) {
          musicText.textContent =
            "Hudbu se nepodařilo spustit";

          musicIcon.textContent = "♪";
        }
      } else {
        music.pause();

        musicText.textContent =
          "Pustit hymnu Světa Carmen";

        musicIcon.textContent = "▶";

        musicButton.setAttribute(
          "aria-pressed",
          "false"
        );

        musicButton.setAttribute(
          "aria-label",
          "Pustit hymnu Světa Carmen"
        );
      }
    });
  </script>

</body>
</html>
