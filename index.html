<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Svět Carmen</title>

  <meta
    name="description"
    content="Vítej ve Světě Carmen. Tady každý příběh začíná srdcem."
  >

  <style>
    :root{
      --deep:#a52d6f;
      --pink:#e45b91;
      --text:#2b1d24;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      min-height:100%;
    }

    body{
      min-height:100vh;
      overflow:hidden;
      color:var(--text);
      font-family:Georgia,"Times New Roman",serif;
      background:#fff4f8;
    }

.home{
  position:relative;
  min-height:100vh;
  overflow:hidden;
  isolation:isolate;

  background-image:url("uvod-svet-carmen.png.png");
  background-repeat:no-repeat;
  background-position:center;
  background-size:cover;
}

/* Jemné rozmazané pozadí vyplní celou obrazovku */
.home::after{
  content:"";
  position:absolute;
  inset:-25px;
  z-index:-2;

  background-image:url("uvod-svet-carmen.png.png");
  background-repeat:no-repeat;
  background-position:center;
  background-size:cover;

  filter:blur(18px);
  transform:scale(1.06);
  opacity:.52;
}

/* Celý originální obrázek bude vidět vpravo */
.home::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:-1;
  pointer-events:none;

  background-image:
    linear-gradient(
      90deg,
      rgba(255,248,246,1) 0%,
      rgba(255,248,246,.99) 20%,
      rgba(255,248,246,.91) 31%,
      rgba(255,248,246,.58) 42%,
      rgba(255,248,246,.14) 52%,
      transparent 61%
    ),
    url("uvod-svet-carmen.png.png");

  background-repeat:no-repeat;
  background-position:center, right center;
  background-size:100% 100%, auto 100%;
    );
    }

    .brand{
      position:absolute;
      top:28px;
      left:3vw;
      z-index:3;
      color:var(--text);
      font-size:22px;
      line-height:.9;
    }

    .brand strong{
      display:block;
      color:var(--deep);
      font-size:35px;
      font-style:italic;
      font-weight:normal;
    }

    .music-btn{
      position:absolute;
      top:28px;
      right:3vw;
      z-index:4;
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 13px 10px 18px;
      border:1px solid rgba(255,255,255,.30);
      border-radius:999px;
      color:white;
      background:rgba(45,23,34,.78);
      backdrop-filter:blur(10px);
      font-family:Arial,Helvetica,sans-serif;
      font-size:14px;
      cursor:pointer;
      box-shadow:0 11px 30px rgba(46,21,34,.25);
      transition:
        transform .2s ease,
        background .2s ease;
    }

    .music-btn:hover{
      transform:translateY(-1px);
      background:rgba(45,23,34,.90);
    }

    .music-icon{
      display:grid;
      place-items:center;
      width:34px;
      height:34px;
      border-radius:50%;
      color:var(--deep);
      background:white;
      font-size:14px;
      line-height:1;
    }

    .home-content{
      position:relative;
      z-index:2;
      width:min(640px,42vw);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      margin-left:3.2vw;
      padding:110px 20px 70px 0;
    }

    .welcome{
      margin-bottom:2px;
      font-size:clamp(42px,4vw,66px);
      font-weight:normal;
      line-height:1.05;
    }

    h1{
      margin-bottom:26px;
      color:var(--deep);
      font-size:clamp(58px,6vw,94px);
      font-weight:normal;
      line-height:.94;
      letter-spacing:-2px;
    }

    .motto{
      max-width:600px;
      margin-bottom:14px;
      font-size:clamp(25px,2.35vw,37px);
      font-style:italic;
      line-height:1.25;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:12px;
      width:min(470px,100%);
      margin:3px 0 23px;
      color:var(--pink);
    }

    .divider::before,
    .divider::after{
      content:"";
      height:1px;
      flex:1;
      background:rgba(228,91,145,.43);
    }

    .intro-text{
      max-width:570px;
      margin-bottom:29px;
      font-size:clamp(18px,1.4vw,23px);
      line-height:1.55;
    }

    .enter-btn{
      align-self:flex-start;
      display:inline-flex;
      align-items:center;
      gap:18px;
      padding:17px 30px;
      border-radius:999px;
      color:white;
      background:linear-gradient(135deg,var(--deep),var(--pink));
      text-decoration:none;
      font-family:Arial,Helvetica,sans-serif;
      font-size:17px;
      font-weight:bold;
      box-shadow:0 15px 34px rgba(165,45,111,.29);
      transition:
        transform .22s ease,
        box-shadow .22s ease;
    }

    .enter-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 20px 44px rgba(165,45,111,.35);
    }

    .enter-btn:focus-visible,
    .music-btn:focus-visible{
      outline:3px solid rgba(255,116,184,.58);
      outline-offset:4px;
    }

    audio{
      display:none;
    }

    @media(max-width:1000px){
      body{
        overflow:auto;
      }

      .home{
        min-height:100svh;
        padding-top:51vh;
        background-position:center top;
        background-size:auto 58vh;
        background-color:#fff8f5;
      }

      .home::before{
        background:
          linear-gradient(
            180deg,
            transparent 0%,
            transparent 32%,
            rgba(255,248,246,.58) 48%,
            rgba(255,248,246,.94) 64%,
            rgba(255,248,246,1) 100%
          );
      }

      .brand{
        top:18px;
        left:22px;
        color:white;
        text-shadow:0 2px 12px rgba(0,0,0,.38);
      }

      .brand strong{
        color:#ffd6e5;
      }

      .music-btn{
        top:17px;
        right:18px;
      }

      .home-content{
        width:100%;
        min-height:auto;
        margin-left:0;
        padding:42px 7vw 55px;
        align-items:center;
        text-align:center;
      }

      .divider{
        margin-left:auto;
        margin-right:auto;
      }

      .enter-btn{
        align-self:center;
      }
    }

    @media(max-width:560px){
      .home{
        padding-top:46vh;
        background-size:auto 52vh;
      }

      .brand{
        font-size:16px;
      }

      .brand strong{
        font-size:25px;
      }

      .music-btn{
        padding:8px;
        font-size:0;
      }

      .music-icon{
        width:34px;
        height:34px;
        font-size:15px;
      }

      .home-content{
        padding:34px 23px 45px;
      }

      .welcome{
        font-size:40px;
      }

      h1{
        font-size:54px;
      }

      .motto{
        font-size:25px;
      }

      .intro-text{
        font-size:18px;
      }

      .enter-btn{
        width:100%;
        max-width:350px;
        justify-content:center;
      }
    }
  </style>
</head>

<body>

  <main class="home">

    <div class="brand" aria-label="Svět Carmen">
      Svět
      <strong>Carmen♡</strong>
    </div>

    <button
      class="music-btn"
      id="musicButton"
      type="button"
      aria-label="Pustit hymnu Světa Carmen"
      aria-pressed="false"
    >
      <span id="musicText">Pustit hymnu Světa Carmen</span>
      <span class="music-icon" id="musicIcon">▶</span>
    </button>

    <section class="home-content">

      <p class="welcome">Vítej ve</p>

      <h1>Světě Carmen.</h1>

      <p class="motto">
        Tady každý příběh začíná srdcem.
      </p>

      <div class="divider" aria-hidden="true">♡</div>

      <p class="intro-text">
        Příběhy o odvaze, přátelství, zvířatech,
        naději a druhých začátcích.
      </p>

      <a class="enter-btn" href="carmen.html">
        Vstoupit a poznat Carmen
        <span aria-hidden="true">→</span>
      </a>

    </section>

  </main>

  <audio id="bgmusic" loop preload="metadata">
    <source src="Svět Carmen.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById("bgmusic");
    const musicButton = document.getElementById("musicButton");
    const musicText = document.getElementById("musicText");
    const musicIcon = document.getElementById("musicIcon");

    music.volume = 0.35;

    musicButton.addEventListener("click", async function () {
      if (music.paused) {
        try {
          await music.play();

          musicText.textContent = "Pozastavit hymnu";
          musicIcon.textContent = "❚❚";

          musicButton.setAttribute("aria-pressed", "true");
          musicButton.setAttribute(
            "aria-label",
            "Pozastavit hymnu Světa Carmen"
          );
        } catch (error) {
          musicText.textContent = "Hudbu se nepodařilo spustit";
          musicIcon.textContent = "♪";
        }
      } else {
        music.pause();

        musicText.textContent = "Pustit hymnu Světa Carmen";
        musicIcon.textContent = "▶";

        musicButton.setAttribute("aria-pressed", "false");
        musicButton.setAttribute(
          "aria-label",
          "Pustit hymnu Světa Carmen"
        );
      }
    });
  </script>

</body>
</html>
