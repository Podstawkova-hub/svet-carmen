<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Svět Carmen</title>

  <meta
    name="description"
    content="Vítej ve Světě Carmen. Tady každý příběh začíná srdcem."
  >

  <style>
    :root{
      --deep:#a52d6f;
      --pink:#ff74b8;
      --cream:#fff8ee;
      --text:#2b1d24;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      min-height:100%;
    }

    body{
      min-height:100vh;
      overflow:hidden;
      font-family:Georgia,"Times New Roman",serif;
      color:var(--text);
      background:#fff4f8;
    }

    .home{
      position:relative;
      min-height:100vh;
      display:flex;
      align-items:center;
      overflow:hidden;
      background-image:url("svet-carmen-uvod.png");
      background-repeat:no-repeat;
      background-position:center;
      background-size:cover;
    }

    .home::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:1;
      background:
        linear-gradient(
          90deg,
          rgba(255,248,244,.98) 0%,
          rgba(255,248,244,.94) 28%,
          rgba(255,248,244,.70) 45%,
          rgba(255,248,244,.22) 62%,
          transparent 78%
        ),
        linear-gradient(
          180deg,
          rgba(255,255,255,.04) 0%,
          transparent 72%,
          rgba(255,239,246,.22) 100%
        );
    }

    .home-content{
      position:relative;
      z-index:2;
      width:min(760px,48%);
      margin-left:6vw;
      padding:50px 20px 50px 0;
    }

    .born{
      display:inline-block;
      margin-bottom:18px;
      padding:9px 15px;
      color:#7b2354;
      background:rgba(255,255,255,.62);
      border:1px solid rgba(165,45,111,.16);
      border-radius:999px;
      font-family:Arial,Helvetica,sans-serif;
      font-size:14px;
      font-weight:bold;
      backdrop-filter:blur(8px);
    }

    h1{
      margin-bottom:22px;
      color:var(--deep);
      font-size:clamp(66px,8vw,118px);
      font-weight:normal;
      line-height:.9;
      letter-spacing:-2px;
    }

    .subtitle{
      max-width:660px;
      margin-bottom:34px;
      font-size:clamp(27px,3vw,43px);
      line-height:1.26;
    }

    .enter-btn{
      display:inline-block;
      padding:17px 31px;
      color:white;
      background:linear-gradient(135deg,var(--deep),var(--pink));
      border-radius:999px;
      text-decoration:none;
      font-family:Arial,Helvetica,sans-serif;
      font-size:17px;
      font-weight:bold;
      box-shadow:0 16px 38px rgba(165,45,111,.26);
      transition:
        transform .22s ease,
        box-shadow .22s ease;
    }

    .enter-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 20px 46px rgba(165,45,111,.32);
    }

    .enter-btn:focus-visible{
      outline:3px solid rgba(255,116,184,.42);
      outline-offset:5px;
    }

    .small-note{
      margin-top:19px;
      color:#75495e;
      font-size:15px;
      font-style:italic;
    }

    audio{
      display:none;
    }

    @media(max-width:900px){
      body{
        overflow:auto;
      }

      .home{
        min-height:100svh;
        align-items:flex-end;
        padding-top:48vh;
        background-position:center top;
      }

      .home::before{
        background:
          linear-gradient(
            180deg,
            transparent 0%,
            transparent 36%,
            rgba(255,248,244,.50) 52%,
            rgba(255,248,244,.94) 69%,
            rgba(255,248,244,1) 100%
          );
      }

      .home-content{
        width:100%;
        margin-left:0;
        padding:42px 7vw 55px;
        text-align:center;
      }

      .subtitle{
        margin-left:auto;
        margin-right:auto;
      }
    }

    @media(max-width:520px){
      .home{
        padding-top:42vh;
        background-position:58% top;
      }

      .home-content{
        padding:34px 24px 45px;
      }

      .born{
        font-size:13px;
      }

      h1{
        font-size:58px;
      }

      .subtitle{
        margin-bottom:27px;
        font-size:27px;
      }

      .enter-btn{
        width:100%;
        max-width:340px;
        padding:16px 24px;
      }
    }
  </style>
</head>

<body>

  <main class="home">

    <div class="home-content">

      <div class="born">
        🌸 Zrozeno 3. 7. 2026
      </div>

      <h1>Svět Carmen</h1>

      <p class="subtitle">
        Vítej ve Světě Carmen.<br>
        Tady každý příběh začíná srdcem.
      </p>

      <a
        class="enter-btn"
        id="enterButton"
        href="carmen.html"
      >
        Vstoupit a poznat Carmen
      </a>

      <p class="small-note">
        Nejdřív poznáš Carmen. Potom se otevře knihovna příběhů.
      </p>

    </div>

  </main>

  <audio id="bgmusic" loop>
    <source src="Svět Carmen.mp3" type="audio/mpeg">
  </audio>

  <script>
    const enterButton = document.getElementById("enterButton");
    const music = document.getElementById("bgmusic");

    enterButton.addEventListener("click", function () {
      sessionStorage.setItem("svetCarmenEntered", "yes");

      if (music) {
        music.volume = 0.35;
        music.play().catch(() => {});
      }
    });
  </script>

</body>
</html>
