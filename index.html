<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Svět Carmen</title>

  <meta
    name="description"
    content="Vítej ve Světě Carmen. Tady každý příběh začíná srdcem."
  >

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background: #16090f;
      font-family: Georgia, "Times New Roman", serif;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: hidden;
      background: #16090f;
    }

    .hero-image {
      display: block;
      width: 100%;
      height: 100vh;
      height: 100svh;

      object-fit: cover;
      object-position: center;

      user-select: none;
      -webkit-user-drag: none;
    }

    .enter-button {
      position: absolute;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%);

      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;

      min-width: 280px;
      padding: 17px 30px;

      color: #ffffff;
      background: linear-gradient(
        135deg,
        rgba(207, 39, 112, 0.96),
        rgba(235, 82, 139, 0.96)
      );

      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;

      font-family: Arial, Helvetica, sans-serif;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;

      box-shadow:
        0 12px 35px rgba(0, 0, 0, 0.35),
        0 0 24px rgba(255, 76, 149, 0.28);

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .enter-button:hover {
      transform: translateX(-50%) scale(1.04);

      box-shadow:
        0 15px 40px rgba(0, 0, 0, 0.42),
        0 0 30px rgba(255, 76, 149, 0.42);
    }

    .enter-button:focus-visible {
      outline: 3px solid #ffffff;
      outline-offset: 4px;
    }

    .arrow {
      font-size: 24px;
      line-height: 1;
    }

    @media (max-width: 700px) {
      .hero {
        min-height: auto;
        align-items: flex-start;
        overflow: visible;
      }

      .hero-image {
        width: 100%;
        height: auto;
        min-height: 100vh;
        min-height: 100svh;

        object-fit: cover;
        object-position: center;
      }

      .enter-button {
        position: fixed;
        left: 18px;
        right: 18px;
        bottom: 18px;

        transform: none;

        min-width: 0;
        width: auto;

        padding: 15px 22px;
        font-size: 15px;
      }

      .enter-button:hover {
        transform: scale(1.02);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .enter-button {
        transition: none;
      }
    }
  </style>
</head>

<body>

  <main class="hero">

    <img
      class="hero-image"
      src="uvod-svet-carmen.png"
      alt="Svět Carmen s Carmen, fénixem, Miou a Čestmírkem"
    >

    <a
      class="enter-button"
      href="o-carmen.html"
    >
      <span>Vstoupit a poznat Carmen</span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>

  </main>

</body>
</html>
