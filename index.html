<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Svět Carmen</title>

  <meta
    name="description"
    content="Vítej ve Světě Carmen. Tady každý příběh začíná srdcem."
  >

  <style>
    :root{
      --deep:#a52d6f;
      --pink:#e45b91;
      --light-pink:#f7bfd5;
      --text:#2b1d24;
      --background:#fff8f6;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      min-height:100%;
    }

    body{
      min-height:100vh;
      color:var(--text);
      font-family:Georgia,"Times New Roman",serif;
      background:
        radial-gradient(
          circle at 68% 48%,
          rgba(255,182,205,.42) 0%,
          rgba(255,224,233,.25) 25%,
          transparent 52%
        ),
        linear-gradient(
          115deg,
          #fffaf8 0%,
          #fff6f7 38%,
          #ffe8ef 65%,
          #ffd4e2 100%
        );
    }

    button,
    a{
      -webkit-tap-highlight-color:transparent;
    }

    .home{
      position:relative;
      width:100%;
      min-height:100vh;
      overflow:hidden;
      isolation:isolate;
    }

    /*
      Jemná atmosféra za obrazem.
      Není to rámeček – pouze světlo, které propojí
      ilustraci s pozadím stránky.
    */
    .home::before{
      content:"";
      position:absolute;
      top:-18%;
      right:-10%;
      width:72vw;
      height:135vh;
      z-index:-3;
      pointer-events:none;
      background:
        radial-gradient(
          ellipse at center,
          rgba(255,107,159,.30) 0%,
          rgba(255,173,202,.20) 34%,
          rgba(255,225,234,.08) 58%,
          transparent 74%
        );
      filter:blur(22px);
    }

    /*
      Světelný přechod mezi textem a obrazem.
      Samotný obraz se neořezává ani neschovává.
    */
    .home::after{
      content:"";
      position:absolute;
      top:0;
      bottom:0;
      left:30%;
      width:30%;
      z-index:-1;
      pointer-events:none;
      background:linear-gradient(
        90deg,
        rgba(255,249,247,.98) 0%,
        rgba(255,246,247,.87) 25%,
        rgba(255,239,244,.52) 57%,
        rgba(255,226,236,.16) 82%,
        transparent 100%
      );
    }

    .brand{
      position:absolute;
      top:27px;
      left:3vw;
      z-index:10;
      color:var(--text);
      font-size:21px;
      line-height:.9;
    }

    .brand strong{
      display:block;
      color:var(--deep);
      font-size:34px;
      font-style:italic;
      font-weight:normal;
    }

    .music-btn{
      position:absolute;
      top:27px;
      right:3vw;
      z-index:10;

      display:flex;
      align-items:center;
      gap:12px;

      padding:10px 13px 10px 18px;
      border:1px solid rgba(255,255,255,.32);
      border-radius:999px;

      color:white;
      background:rgba(45,23,34,.80);
      backdrop-filter:blur(10px);

      font-family:Arial,Helvetica,sans-serif;
      font-size:14px;
      cursor:pointer;

      box-shadow:
        0 11px 30px rgba(46,21,34,.23),
        0 0 25px rgba(255,120,169,.12);

      transition:
        transform .2s ease,
        background .2s ease,
        box-shadow .2s ease;
    }

    .music-btn:hover{
      transform:translateY(-2px);
      background:rgba(45,23,34,.92);
      box-shadow:
        0 15px 34px rgba(46,21,34,.28),
        0 0 30px rgba(255,120,169,.19);
    }

    .music-icon{
      display:grid;
      place-items:center;

      width:34px;
      height:34px;
      border-radius:50%;

      color:var(--deep);
      background:white;

      font-size:14px;
      line-height:1;
    }

    .hero-layout{
      position:relative;
      width:100%;
      min-height:100vh;

      display:grid;
      grid-template-columns:minmax(420px, 40%) minmax(0, 60%);
      align-items:center;
    }

    .home-content{
      position:relative;
      z-index:4;

      width:100%;
      max-width:650px;

      display:flex;
      flex-direction:column;
      justify-content:center;

      padding:
        125px
        clamp(25px,3vw,58px)
        75px
        clamp(35px,3.3vw,66px);
    }

    .welcome{
      margin-bottom:2px;
      font-size:clamp(40px,3.7vw,64px);
      font-weight:normal;
      line-height:1.04;
    }

    h1{
      margin-bottom:25px;
      color:var(--deep);

      font-size:clamp(56px,5.6vw,91px);
      font-weight:normal;
      line-height:.94;
      letter-spacing:-2px;
    }

    .motto{
      max-width:590px;
      margin-bottom:14px;

      font-size:clamp(24px,2.2vw,36px);
      font-style:italic;
      line-height:1.25;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:12px;

      width:min(455px,100%);
      margin:3px 0 23px;

      color:var(--pink);
    }

    .divider::before,
    .divider::after{
      content:"";
      height:1px;
      flex:1;
      background:rgba(228,91,145,.43);
    }

    .intro-text{
      max-width:555px;
      margin-bottom:29px;

      font-size:clamp(18px,1.35vw,23px);
      line-height:1.55;
    }

    .enter-btn{
      align-self:flex-start;

      display:inline-flex;
      align-items:center;
      gap:18px;

      padding:17px 30px;
      border-radius:999px;

      color:white;
      background:linear-gradient(
        135deg,
        var(--deep),
        var(--pink)
      );

      text-decoration:none;
      font-family:Arial,Helvetica,sans-serif;
      font-size:17px;
      font-weight:bold;

      box-shadow:
        0 15px 34px rgba(165,45,111,.29),
        0 0 24px rgba(228,91,145,.14);

      transition:
        transform .22s ease,
        box-shadow .22s ease;
    }

    .enter-btn:hover{
      transform:translateY(-2px);
      box-shadow:
        0 20px 44px rgba(165,45,111,.37),
        0 0 32px rgba(228,91,145,.20);
    }

    .enter-btn:focus-visible,
    .music-btn:focus-visible{
      outline:3px solid rgba(255,116,184,.58);
      outline-offset:4px;
    }

    /*
      Pravá část s celým originálním obrazem.
    */
    .hero-art{
      position:relative;
      z-index:2;

      width:100%;
      height:100vh;
      min-height:650px;

      display:flex;
      align-items:center;
      justify-content:center;

      padding:
        74px
        clamp(20px,3vw,58px)
        32px
        clamp(15px,2vw,38px);
    }

    /*
      Kontrastní záře přímo za ilustrací.
      Žádný rámeček ani karta.
    */
    .hero-art::before{
      content:"";
      position:absolute;
      top:11%;
      right:4%;
      bottom:6%;
      left:7%;
      z-index:-1;
      pointer-events:none;

      border-radius:50%;

      background:
        radial-gradient(
          ellipse at 54% 46%,
          rgba(255,197,211,.58) 0%,
          rgba(255,154,188,.25) 37%,
          rgba(255,101,157,.10) 57%,
          transparent 75%
        );

      filter:blur(24px);
      transform:scale(1.04);
    }

    .hero-image{
      display:block;

      width:auto;
      height:auto;

      max-width:100%;
      max-height:calc(100vh - 105px);

      /*
        Zásadní nastavení:
        celý obrázek se vejde dovnitř a nic se neořízne.
      */
      object-fit:contain;
      object-position:center;

      filter:
        drop-shadow(0 25px 34px rgba(67,18,41,.25))
        drop-shadow(0 0 23px rgba(255,92,151,.13));
    }

    audio{
      display:none;
    }

    /*
      Menší notebooky.
    */
    @media(max-width:1180px){
      .hero-layout{
        grid-template-columns:minmax(390px,43%) minmax(0,57%);
      }

      .home-content{
        padding-left:35px;
        padding-right:18px;
      }

      .hero-art{
        padding-left:5px;
        padding-right:20px;
      }

      .hero-image{
        max-height:calc(100vh - 125px);
      }
    }

    /*
      Tablet a telefon:
      nejdříve celý obraz, potom text.
    */
    @media(max-width:900px){
      body{
        overflow:auto;
      }

      .home{
        overflow:visible;
      }

      .home::after{
        display:none;
      }

      .hero-layout{
        min-height:100svh;
        display:flex;
        flex-direction:column;
      }

      .hero-art{
        order:1;

        width:100%;
        height:auto;
        min-height:0;

        padding:
          82px
          18px
          0;
      }

      .hero-art::before{
        top:12%;
        right:2%;
        bottom:-4%;
        left:2%;
      }

      .hero-image{
        width:auto;
        height:auto;

        max-width:min(100%,620px);
        max-height:72svh;
      }

      .home-content{
        order:2;

        width:100%;
        max-width:760px;

        align-items:center;
        text-align:center;

        padding:
          38px
          7vw
          58px;
      }

      .divider{
        margin-left:auto;
        margin-right:auto;
      }

      .enter-btn{
        align-self:center;
      }

      .brand{
        top:18px;
        left:22px;
      }

      .music-btn{
        top:17px;
        right:18px;
      }
    }

    @media(max-width:560px){
      .brand{
        font-size:16px;
      }

      .brand strong{
        font-size:25px;
      }

      .music-btn{
        padding:8px;
        font-size:0;
      }

      .music-icon{
        width:34px;
        height:34px;
        font-size:15px;
      }

      .hero-art{
        padding:
          75px
          8px
          0;
      }

      .hero-image{
        max-width:100%;
        max-height:65svh;
      }

      .home-content{
        padding:
          32px
          23px
          45px;
      }

      .welcome{
        font-size:39px;
      }

      h1{
        margin-bottom:21px;
        font-size:52px;
        letter-spacing:-1px;
      }

      .motto{
        font-size:24px;
      }

      .intro-text{
        font-size:18px;
      }

      .enter-btn{
        width:100%;
        max-width:350px;
        justify-content:center;
      }
    }

    /*
      Nízké obrazovky počítačů.
    */
    @media(min-width:901px) and (max-height:720px){
      .home-content{
        padding-top:90px;
        padding-bottom:35px;
      }

      .welcome{
        font-size:39px;
      }

      h1{
        margin-bottom:18px;
        font-size:61px;
      }

      .motto{
        font-size:25px;
      }

      .intro-text{
        margin-bottom:21px;
        font-size:18px;
      }

      .hero-art{
        padding-top:65px;
        padding-bottom:20px;
      }

      .hero-image{
        max-height:calc(100vh - 80px);
      }
    }
  </style>
</head>

<body>

  <main class="home">

    <div class="brand" aria-label="Svět Carmen">
      Svět
      <strong>Carmen♡</strong>
    </div>

    <button
      class="music-btn"
      id="musicButton"
      type="button"
      aria-label="Pustit hymnu Světa Carmen"
      aria-pressed="false"
    >
      <span id="musicText">Pustit hymnu Světa Carmen</span>
      <span class="music-icon" id="musicIcon">▶</span>
    </button>

    <div class="hero-layout">

      <section class="home-content">

        <p class="welcome">
          Vítej ve
        </p>

        <h1>
          Světě Carmen.
        </h1>

        <p class="motto">
          Tady každý příběh začíná srdcem.
        </p>

        <div
          class="divider"
          aria-hidden="true"
        >
          ♡
        </div>

        <p class="intro-text">
          Příběhy o odvaze, přátelství, zvířatech,
          naději a druhých začátcích.
        </p>

        <a
          class="enter-btn"
          href="carmen.html"
        >
          Vstoupit a poznat Carmen
          <span aria-hidden="true">→</span>
        </a>

      </section>

      <section
        class="hero-art"
        aria-label="Hlavní obraz Světa Carmen"
      >
        <img
          class="hero-image"
          src="uvod-svet-carmen.png.png"
          alt="Carmen s fénixem, Miou, Čestmírkem a světem příběhů"
        >
      </section>

    </div>

  </main>

  <audio
    id="bgmusic"
    loop
    preload="metadata"
  >
    <source
      src="Svět Carmen.mp3"
      type="audio/mpeg"
    >
  </audio>

  <script>
    const music = document.getElementById("bgmusic");
    const musicButton = document.getElementById("musicButton");
    const musicText = document.getElementById("musicText");
    const musicIcon = document.getElementById("musicIcon");

    music.volume = 0.35;

    musicButton.addEventListener("click", async function () {
      if (music.paused) {
        try {
          await music.play();

          musicText.textContent = "Pozastavit hymnu";
          musicIcon.textContent = "❚❚";

          musicButton.setAttribute(
            "aria-pressed",
            "true"
          );

          musicButton.setAttribute(
            "aria-label",
            "Pozastavit hymnu Světa Carmen"
          );
        } catch (error) {
          musicText.textContent =
            "Hudbu se nepodařilo spustit";

          musicIcon.textContent = "♪";
        }
      } else {
        music.pause();

        musicText.textContent =
          "Pustit hymnu Světa Carmen";

        musicIcon.textContent = "▶";

        musicButton.setAttribute(
          "aria-pressed",
          "false"
        );

        musicButton.setAttribute(
          "aria-label",
          "Pustit hymnu Světa Carmen"
        );
      }
    });
  </script>

</body>
</html>
