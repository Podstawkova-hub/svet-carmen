<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beruška a Brouček</title>
  <style>
    body{
      margin:0;
      font-family: Georgia, "Times New Roman", serif;
      background:linear-gradient(180deg,#fff7fb,#ffe3f1,#fff8ee);
      color:#1f1420;
      text-align:center;
    }
    header{
      padding:50px 20px 30px;
    }
    h1{
      color:#a52d6f;
      font-size:clamp(42px,7vw,78px);
      margin:0;
    }
    p{
      font-size:22px;
      line-height:1.6;
      max-width:800px;
      margin:20px auto;
    }
    .btn{
      display:inline-block;
      margin:20px 10px;
      padding:14px 26px;
      border-radius:999px;
      background:linear-gradient(135deg,#a52d6f,#ff74b8);
      color:white;
      text-decoration:none;
      font-weight:bold;
    }
    audio{
      margin:25px auto;
      display:block;
      max-width:90%;
    }
    .book{
      max-width:980px;
      margin:30px auto;
      padding:0 18px 60px;
    }
    .page{
      width:100%;
      margin:34px auto;
      border-radius:24px;
      box-shadow:0 25px 70px rgba(122,35,84,.25);
      background:white;
    }
    footer{
      padding:40px 20px;
      color:#7d4964;
    }
  </style>
</head>
<body>

<header>
  <h1>🐞 Beruška a Brouček</h1>
  <p>Příběh jedné zprávy, která změnila dvě srdce.</p>

  <a class="btn" href="index.html">🏠 Zpět do Světa Carmen</a>

  <audio controls loop>
    <source src="ladybug-little-bug.mp3" type="audio/mpeg">
  </audio>
</header>

<main class="book">
  <img class="page" src="obalka.png" alt="Obálka Beruška a Brouček">
  <img class="page" src="strana-01.png" alt="Strana 1">
  <img class="page" src="strana-02.png" alt="Strana 2">
  <img class="page" src="strana-03.png" alt="Strana 3">
  <img class="page" src="strana-04.png" alt="Strana 4">
  <img class="page" src="strana-05.png" alt="Strana 5">
  <img class="page" src="strana-08.png" alt="Strana 8">
  <img class="page" src="strana-09.png" alt="Strana 9">
  <img class="page" src="strana-10.png" alt="Strana 10">
  <img class="page" src="strana-11.png" alt="Strana 11">
  <img class="page" src="strana-12.png" alt="Strana 12">
  <img class="page" src="strana-16.png" alt="Strana 16">
  <img class="page" src="strana-17.png" alt="Strana 17">
  <img class="page" src="zadni-strana.png" alt="Zadní strana">
</main>

<footer>
  © Svět Carmen · Beruška a Brouček · Pro Eny od Carmen
</footer>

</body>
</html>
